global:
  resolve_timeout: 5m

route:
  receiver: slack
  group_by: [alertname, service]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 30m

receivers:
  - name: slack
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts'
        send_resolved: true
        title: >-
          [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
        text: >-
          Serviço: {{ .CommonLabels.service }}
          {{- if .CommonLabels.endpoint }} | Endpoint: {{ .CommonLabels.endpoint }}{{ end }}
          \nResumo: {{ .CommonAnnotations.summary }}
          \nDescrição: {{ .CommonAnnotations.description }}

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity =~ warning|info
    equal: [alertname, service]
