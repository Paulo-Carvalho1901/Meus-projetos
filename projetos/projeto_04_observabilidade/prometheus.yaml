global:
  scrape_interval: 10s
  evaluation_interval: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Métricas exportadas pelo OTel Collector (via exporter prometheus)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Métricas internas do próprio coletor
  - job_name: "otel-collector-interno"
    static_configs:
      - targets: ["otel-collector:8888"]
